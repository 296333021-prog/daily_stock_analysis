name: 定时触发股票分析

on:
  schedule:
    # 北京时间 11:30（周一至周五）
    - cron: '30 3 * * 1-5'
    # 北京时间 15:00（周一至周五）
    - cron: '0 7 * * 1-5'
  workflow_dispatch:  # 也支持手动测试

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: 触发每日股票分析
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '00-daily-analysis.yml',
              ref: 'main',
              inputs: { mode: 'full', force_run: 'true' }
            })
            console.log('✅ 已触发每日股票分析')
